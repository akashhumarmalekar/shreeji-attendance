td{padding:8px 11px;border-bottom:1px solid #f0f0f0;vertical-align:middle;}
tr:nth-child(even) td{background:#fafafa;}
.input-s{padding:8px 12px;border-radius:8px;border:1px solid #ddd;font-size:13px;color:#1a1a1a;background:#fff;width:100%;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 15px;border-radius:8px;border:none;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;transition:opacity .15s;}
.btn:hover{opacity:.88;}
.btn-green{background:#15803d;color:#fff;}

.btn-red{background:#dc2626;color:#fff;}

.modal{background:#fff;border-radius:14px;padding:28px;max-width:440px;width:92%;box-shadow:0 10px 50px rgba(0,0,0,.2);}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
@media(max-width:540px){.form-grid{grid-template-columns:1fr;}}
.form-label{display:block;font-size:11px;font-weight:600;color:#555;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;}
.form-input{width:100%;padding:9px 12px;border-radius:8px;border:1px solid #ddd;font-size:13px;color:#1a1a1a;background:#fff;transition:border-color .15s;}

// ─── Category logic ───────────────────────────────────────────────────────────
// Returns "R" | "I" | "N" based on last N sessions in history
function calcCategory(name, history){
  // Get all records for this person in chronological order (most recent last)
  const sessions=history.filter(s=>s.records.some(r=>r.name===name));
  if(sessions.length===0) return "N";
  const recent6=sessions.slice(-6);
  const recent4=sessions.slice(-4);
  const attended4=recent4.filter(s=>s.records.find(r=>r.name===name&&r.status==="P")).length;
  const attended6=recent6.filter(s=>s.records.find(r=>r.name===name&&r.status==="P")).length;
  if(attended4>=1) return "R";
  if(attended6>=1) return "I";
  return "N";
}

  function getCategory(name,hist){

  const filtered=allMembers
    .filter(m=>
      m.name.toLowerCase().includes(search.toLowerCase())&&
      (filterFP==="All"||m.followup===filterFP)
    )
    .sort((a,b)=>{
      const sA=attendance[a.name]?.status==="P";
      const sB=attendance[b.name]?.status==="P";
      // Present always on top
      if(sA&&!sB) return -1;
      if(!sA&&sB) return 1;
      // Both present: sort by time descending (most recent first)
      if(sA&&sB){
        const tA=attendance[a.name]?.time||"";
        const tB=attendance[b.name]?.time||"";
        // "HH:MM" string comparison works for same-day times
        if(tA&&tB) return tB.localeCompare(tA);
        if(tA) return -1;
        if(tB) return 1;
        return 0;
      }
      // Both non-present: alphabetical
      return a.name.localeCompare(b.name);
    });

  const totalA=Object.values(attendance).filter(a=>a.status==="A").length;

  function doSaveEdit(){
    if(!editForm.fullName.trim()){toast_("Full name cannot be empty","error");return;}
    if(!editForm.followup.trim()){toast_("Followup group cannot be empty","error");return;}
    const oldName=editTarget.name;
    const newName=editForm.fullName.trim();
    const namChanged=newName!==oldName;

    // Update followup override
    const newOv={...fpOverrides};
    if(editForm.followup!==editTarget.followup){
      newOv[newName]=editForm.followup;
    } else {
      delete newOv[newName];
    }
    if(namChanged) delete newOv[oldName];

    // Update extra members if applicable
    if(editTarget.isExtra){
      const upd=extraMembers.map(m=>m.name===oldName?{
        ...m,
        name:newName,
        dob:editForm.dob,
        contact:editForm.contact.trim(),
        reference:editForm.reference.trim(),
        address:editForm.address.trim(),
        followup:editForm.followup.trim(),
      }:m);
      setExtraMembers(upd);saveMembers(upd);
    } else {
      // For MASTER members only followup override + contact/address stored as override
      newOv[`${oldName}__contact`]=editForm.contact.trim();
      newOv[`${oldName}__address`]=editForm.address.trim();
    }

    // Rename attendance key if name changed
    if(namChanged){
      const newAtt={...attendance};
      if(newAtt[oldName]){newAtt[newName]=newAtt[oldName];delete newAtt[oldName];}
      setAttendance(newAtt);saveAtt(newAtt);
      // Update history records
      const newHist=history.map(s=>({
        ...s,
        records:s.records.map(r=>r.name===oldName?{...r,name:newName}:r)
      }));
      setHistory(newHist);saveHist(newHist);
    }

    if(editForm.followup.trim()!==editTarget.followup){
      newOv[newName]=editForm.followup.trim();
    }

    setFPOverrides(newOv);saveFPOverrides(newOv);
    setEditTarget(null);setEditForm(null);
    toast_(`${newName} updated successfully!`);
  }

      setExtraMembers(upd);saveMembers(upd);

    // Clean up overrides
    const newOv={...fpOverrides};

  // ── Historic date range helpers ───────────────────────────────────────────
  // Parse "02 May 2025" style dates to comparable YYYYMMDD numbers
  const MONTHS={Jan:1,Feb:2,Mar:3,Apr:4,May:5,Jun:6,Jul:7,Aug:8,Sep:9,Oct:10,Nov:11,Dec:12};
  function parseDateKey(d){
    // "02 May 2025" -> 20250502
    if(!d) return 0;
    const p=d.split(" ");
    if(p.length!==3) return 0;
    const day=parseInt(p[0]),mon=MONTHS[p[1]]||0,yr=parseInt(p[2]);
    return yr*10000+mon*100+day;
  }
  function parseInputDate(s){
    // "2025-05-01" (HTML date input) -> 20250501
    if(!s) return 0;
    const p=s.split("-");
    return parseInt(p[0])*10000+parseInt(p[1])*100+parseInt(p[2]);
  }
  const filteredDates=useMemo(()=>{
    const from=parseInputDate(histFrom);
    const to=parseInputDate(histTo);
    return allDates.filter(d=>{
      const v=parseDateKey(d);
      if(from&&v<from) return false;
      if(to&&v>to) return false;
      return true;
    });
  },[allDates,histFrom,histTo]);

        ?s.records.map(r=>r.name===memberName?{...r,status:newStatus,editedAt:new Date().toLocaleString("en-IN")}:r)
        :[...s.records,{name:memberName,followup:allMembers.find(m=>m.name===memberName)?.followup||"",status:newStatus,time:"",editedAt:new Date().toLocaleString("en-IN")}];
      return{...s,records};
    });
    setHistory(newHist);saveHist(newHist);
    setHistEditCell(null);
    toast_(`${memberName} — ${date} updated to ${newStatus==="P"?"Present":"Absent"}`);
  }

  // ── Build followup WA message (new format) ───────────────────────────────
  function buildFPMsg(fp){
    const members=allMembers.filter(m=>m.followup===fp);
    const present=members.filter(m=>attendance[m.name]?.status==="P");
    const absent=members.filter(m=>attendance[m.name]?.status!=="P");

    // Split present by category

  // ── Monthly summary data ──────────────────────────────────────────────────
  const monthlySummary=useMemo(()=>{
    const months={};
    prevHistory.forEach(s=>{
      const parts=s.date.split(" ");
      const key=parts.length===3?`${parts[1]} ${parts[2]}`:"Unknown";
      if(!months[key])months[key]={key,sessions:[],dates:[]};
      months[key].sessions.push(s);
      months[key].dates.push(s.date);
    });
    return Object.values(months).sort((a,b)=>{
      const [am,ay]=a.key.split(" ");const [bm,by]=b.key.split(" ");
      const MONTHS2={Jan:1,Feb:2,Mar:3,Apr:4,May:5,Jun:6,Jul:7,Aug:8,Sep:9,Oct:10,Nov:11,Dec:12};
      return (parseInt(ay)*100+MONTHS2[am])-(parseInt(by)*100+MONTHS2[bm]);
    }).map(m=>{
      const totalSessions=m.sessions.length;
      const presentCounts=m.sessions.map(s=>s.records.filter(r=>r.status==="P").length);
      const avgPresent=totalSessions>0?Math.round(presentCounts.reduce((a,b)=>a+b,0)/totalSessions):0;
      const maxP=Math.max(...presentCounts);
      const minP=Math.min(...presentCounts);
      const bestDate=m.sessions[presentCounts.indexOf(maxP)]?.date||"";
      const worstDate=m.sessions[presentCounts.indexOf(minP)]?.date||"";
      const totalMembers=allMembers.length;
      const avgPct=totalMembers>0?Math.round(avgPresent/totalMembers*100):0;
      return{...m,totalSessions,avgPresent,avgPct,maxP,minP,bestDate,worstDate};

    const recent=prevHistory.filter(s=>{
      const parts=s.date.split(" ");

      const MONTHS2={Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
      const d=new Date(parseInt(parts[2]),MONTHS2[parts[1]],parseInt(parts[0]));
      return d>=threeMonthsAgo;
    });
    const recentP=recent.filter(s=>s.records.find(r=>r.name===name&&r.status==="P")).length;
    const recentPct=recent.length>0?Math.round(recentP/recent.length*100):0;

      try{

        if(data.history){setHistory(data.history);saveHist(data.history);}
        if(data.attendance){setAttendance(data.attendance);saveAtt(data.attendance);}
        if(data.extraMembers){setExtraMembers(data.extraMembers);saveMembers(data.extraMembers);}

  // ── Dashboard data ────────────────────────────────────────────────────────
  const dashData=useMemo(()=>{
    if(prevHistory.length===0) return null;
    const last10=prevHistory.slice(-10);
    const last6=prevHistory.slice(-6);

    // Trend: per-session totals
    const trend=last10.map(s=>{
      const totalPresent=s.records.filter(r=>r.status==="P").length;
      const regPresent=s.records.filter(r=>r.status==="P"&&calcCategory(r.name,prevHistory)==="R").length;
      const regAbsent=s.records.filter(r=>r.status==="A"&&calcCategory(r.name,prevHistory)==="R").length;
      const irrPresent=s.records.filter(r=>r.status==="P"&&calcCategory(r.name,prevHistory)==="I").length;
      const noPresent=s.records.filter(r=>r.status==="P"&&calcCategory(r.name,prevHistory)==="N").length;
      const totalMembers=allMembers.length;
      return{date:s.date,totalPresent,regPresent,regAbsent,irrPresent,noPresent,totalMembers,pct:Math.round(totalPresent/totalMembers*100)};
    });

    // KPIs
    const avg=Math.round(trend.reduce((s,t)=>s+t.totalPresent,0)/trend.length);
    const avgPct=Math.round(trend.reduce((s,t)=>s+t.pct,0)/trend.length);
    const best=trend.reduce((a,b)=>b.totalPresent>a.totalPresent?b:a);
    const worst=trend.reduce((a,b)=>b.totalPresent<a.totalPresent?b:a);
    const latest=trend[trend.length-1];
    const prev=trend.length>1?trend[trend.length-2]:null;
    const trend_dir=prev?(latest.totalPresent>prev.totalPresent?1:latest.totalPresent<prev.totalPresent?-1:0):0;

    // Category counts live
    const liveR=allMembers.filter(m=>calcCategory(m.name,prevHistory)==="R").length;
    const liveI=allMembers.filter(m=>calcCategory(m.name,prevHistory)==="I").length;
    const liveN=allMembers.filter(m=>calcCategory(m.name,prevHistory)==="N").length;

    // Followup performance (avg % over last 6 sessions)
    const fpPerf=allFollowups.map(fp=>{
      const members=allMembers.filter(m=>m.followup===fp);
      if(!members.length) return null;
      const avgPres=last6.reduce((sum,s)=>{
        const cnt=s.records.filter(r=>members.some(m=>m.name===r.name)&&r.status==="P").length;
        return sum+Math.round(cnt/members.length*100);
      },0)/Math.max(last6.length,1);
      return{fp,avg:Math.round(avgPres),members:members.length};
    }).filter(Boolean).sort((a,b)=>b.avg-a.avg);

    // Streak: current streak of sessions with >50% attendance
    let streak=0;
    for(let i=trend.length-1;i>=0;i--){
      if(trend[i].pct>=50)streak++;else break;
    }

    return{trend,avg,avgPct,best,worst,latest,prev,trend_dir,liveR,liveI,liveN,fpPerf,streak};
  },[prevHistory,allMembers,allFollowups]);

    return allMembers.map(m=>{

      const attended=sessions.map(s=>s.records.find(r=>r.name===m.name)?.status==="P"?1:0);
      const total=attended.reduce((a,b)=>a+b,0);

      // Trend: compare last 3 vs prev 3
      const last3=attended.slice(-3).reduce((a,b)=>a+b,0);
      const prev3=attended.slice(0,3).reduce((a,b)=>a+b,0);
      const dropping=prev3>last3;
      const riskScore=dropping?(prev3-last3)*2+(cat==="R"?3:cat==="I"?1:0):0;
      return{name:m.name,followup:m.followup,cat,riskScore,last3,prev3,total,sessions:sessions.length};

    return allMembers.map(m=>{
      const catNow=calcCategory(m.name,prevHistory);

      // Dropped category
      const dropped=(catPrev==="R"&&(catNow==="I"||catNow==="N"))||(catPrev==="I"&&catNow==="N");
      // Consecutive absences
      const lastSessions=prevHistory.slice(-4).map(s=>s.records.find(r=>r.name===m.name)?.status);
      const consAbsent=lastSessions.filter(s=>s==="A").length;

      return action?{name:m.name,followup:m.followup,catNow,catPrev,action,consAbsent}:null;

  // ── Year-over-Year ───────────────────────────────────────────────────────
  function parseInputDate2(s){if(!s)return 0;const p=s.split("-");return parseInt(p[0])*10000+parseInt(p[1])*100+parseInt(p[2]);}
  const yoyData=useMemo(()=>{
    const MONTHS={Jan:1,Feb:2,Mar:3,Apr:4,May:5,Jun:6,Jul:7,Aug:8,Sep:9,Oct:10,Nov:11,Dec:12};
    function sessInRange(from,to){
      const f=parseInputDate2(from),t=parseInputDate2(to);
      return prevHistory.filter(s=>{
        const p=s.date.split(" ");if(p.length!==3)return false;
        const v=parseInt(p[2])*10000+(MONTHS[p[1]]||0)*100+parseInt(p[0]);
        return(!f||v>=f)&&(!t||v<=t);
      });
    }
    const r1=sessInRange(yoyRange1From,yoyRange1To);
    const r2=sessInRange(yoyRange2From,yoyRange2To);
    function stats(sessions){
      if(!sessions.length)return{sessions:0,avgPresent:0,avgPct:0,totalSessions:0};
      const tots=sessions.map(s=>s.records.filter(r=>r.status==="P").length);
      const avg=Math.round(tots.reduce((a,b)=>a+b,0)/sessions.length);
      return{sessions:sessions.length,avgPresent:avg,avgPct:allMembers.length?Math.round(avg/allMembers.length*100):0,totalSessions:sessions.length,data:sessions.map((s,i)=>({i,date:s.date,cnt:tots[i]}))};
    }
    return{r1:stats(r1),r2:stats(r2),raw1:r1,raw2:r2};
  },[prevHistory,allMembers,yoyRange1From,yoyRange1To,yoyRange2From,yoyRange2To]);

    <div class="two-col">
      <div><h2>Present (${present.length})</h2>
      <table><thead><tr><th>#</th><th>Name</th><th>Followup</th><th>Time</th></tr></thead><tbody>${pRow}</tbody></table></div>
      <div><h2>Absent (${absent.length})</h2>
      <table><thead><tr><th>#</th><th>Name</th><th>Followup</th><th>Note</th></tr></thead><tbody>${aRow}</tbody></table></div>
    </div>
    ${d?`<h2>Dashboard Snapshot</h2><div class="stats"><div class="stat"><b>${d.liveR}</b>Regular</div><div class="stat"><b>${d.liveI}</b>Irregular</div><div class="stat"><b>${d.liveN}</b>No Category</div><div class="stat"><b>${d.streak}</b>Session Streak</div></div>`:""}
    <script>window.onload=()=>window.print();<\/script></body></html>`);

    setShowPrintModal(false);
  }

  // ─────────────────────────────────────────────────────────────────────────
  return(
    <div ref={swipeRef} onTouchStart={onTouchStart} onTouchEnd={onTouchEnd}
      style={{maxWidth:960,margin:"0 auto",padding:"16px 12px",minHeight:"100vh",
        background:darkMode?"#0f172a":"transparent",color:darkMode?"#e2e8f0":"#1a1a1a",
        transition:"background .2s,color .2s"}}>
      {toast&&<div className="toast" style={{background:toast.type==="info"?"#1e40af":toast.type==="success"?"#15803d":"#991b1b"}}>{toast.msg}</div>}

      {/* ══ PIN LOCK SCREEN ══ */}
      {pin&&!pinUnlocked&&<div style={{position:"fixed",inset:0,background:"#0f172a",display:"flex",alignItems:"center",justifyContent:"center",zIndex:9999}}>
        <div style={{background:"#1e293b",borderRadius:20,padding:40,textAlign:"center",width:320,boxShadow:"0 20px 60px rgba(0,0,0,.5)"}}>
          <div style={{fontSize:40,marginBottom:8}}>🙏</div>
          <div style={{fontWeight:700,fontSize:18,color:"#f1f5f9",marginBottom:4}}>|| Swami Shreeji ||</div>
          <div style={{fontSize:12,color:"#94a3b8",marginBottom:28}}>Enter PIN to access</div>
          <input type="password" maxLength={8} placeholder="Enter PIN"
            value={pinInput} onChange={e=>setPinInput(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&tryUnlock()}
            style={{width:"100%",padding:"12px 16px",borderRadius:10,border:"1px solid #334155",background:"#0f172a",color:"#f1f5f9",fontSize:18,textAlign:"center",letterSpacing:8,marginBottom:16}}
            autoFocus/>
          <button onClick={tryUnlock} style={{width:"100%",padding:"12px",borderRadius:10,border:"none",background:"#15803d",color:"#fff",fontSize:15,fontWeight:600,cursor:"pointer"}}>Unlock</button>
        </div>
      </div>}

      {/* Header */}
      <div style={{marginBottom:16,display:"flex",alignItems:"flex-start",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
        <div>
          <h1 style={{margin:"0 0 2px",fontSize:21,fontWeight:700}}>🙏 || Swami Shreeji || Attendance</h1>
          <div style={{fontSize:12,color:"#888"}}>Session: &nbsp;
            <input value={sessionDate} onChange={e=>setSessionDate(e.target.value)}
              style={{border:"1px solid #ddd",borderRadius:6,padding:"2px 8px",fontSize:12,color:"#1a1a1a",width:150,marginRight:8}}/>
            <select value={sabhaType} onChange={e=>{setSabhaType(e.target.value);localStorage.setItem(LS_SABHA,e.target.value);}}
              style={{border:"1px solid #ddd",borderRadius:6,padding:"2px 8px",fontSize:12,color:"#1a1a1a",background:"#fff"}}>
              {["Weekly","Monthly","Special","Yuva Shibir","Festival"].map(t=><option key={t}>{t}</option>)}
            </select>
          </div>
        </div>
        {pin&&<button onClick={()=>{setPinUnlocked(false);setPinInput("");}} className="btn btn-gray" style={{fontSize:12}}>🔒 Lock</button>}
        <button onClick={()=>setDarkMode(d=>!d)} className="btn btn-gray" style={{fontSize:13}} title="Toggle dark mode">{darkMode?"☀️":"🌙"}</button>
        <button onClick={()=>setShowPrintModal(true)} className="btn btn-blue" style={{fontSize:12}}>🖨 Print Report</button>
      </div>

      {/* Tabs */}
      <div style={{display:"flex",borderBottom:"1px solid #ddd",marginBottom:18,gap:0,overflowX:"auto"}}>
        {[["dashboard","📈 Dashboard"],["panel","📋 Attendance"],["report","📊 Report"],["history","🕒 Historic"],["monthly","📅 Monthly"],["predict","🔮 Predict"],["action","⚡ Actions"],["yoy","📆 Compare"],["restructure","🔄 Followup"],["register","➕ New Yuvak"],["edit","✏️ Edit"],["settings","⚙️ Settings"]].map(([id,label])=>(
          <button key={id} className={`tab-btn${tab===id?" active":""}`} onClick={()=>setTab(id)}>{label}</button>
        ))}
      </div>

      {/* ═══════════════════ DASHBOARD TAB ═══════════════════ */}
      {tab==="dashboard"&&<>
        {!dashData&&<div className="card" style={{padding:48,textAlign:"center"}}>
          <div style={{fontSize:36,marginBottom:12}}>📈</div>
          <div style={{fontWeight:600,fontSize:16,color:"#555"}}>No data yet</div>
          <div style={{fontSize:13,color:"#aaa",marginTop:6}}>Submit at least one session to see the dashboard.</div>
        </div>}

        {dashData&&<>
          {/* ── KPI Cards ── */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:10,marginBottom:20}}>
            {[
              {label:"Avg Attendance",value:dashData.avg,sub:`${dashData.avgPct}% of ${allMembers.length}`,color:"#1e40af",bg:"#eff6ff"},
              {label:"Last Session",value:dashData.latest.totalPresent,sub:`${dashData.latest.pct}%  ${dashData.trend_dir>0?"▲ up":""}${dashData.trend_dir<0?"▼ down":""}${dashData.trend_dir===0?"-> same":""}`,color:dashData.trend_dir>=0?"#15803d":"#b91c1c",bg:dashData.trend_dir>=0?"#f0fdf4":"#fef2f2"},
              {label:"Best Session",value:dashData.best.totalPresent,sub:dashData.best.date,color:"#15803d",bg:"#f0fdf4"},
              {label:"Lowest Session",value:dashData.worst.totalPresent,sub:dashData.worst.date,color:"#b91c1c",bg:"#fef2f2"},
              {label:"Regular Yuvaks",value:dashData.liveR,sub:`of ${allMembers.length} total`,color:"#15803d",bg:"#f0fdf4"},
              {label:"Irregular",value:dashData.liveI,sub:"need attention",color:"#92400e",bg:"#fffbeb"},
              {label:"No Category",value:dashData.liveN,sub:"not attending",color:"#b91c1c",bg:"#fef2f2"},
              {label:">50% Streak",value:dashData.streak,sub:"consecutive sessions",color:"#7c3aed",bg:"#f5f3ff"},
            ].map(k=>(
              <div key={k.label} style={{background:k.bg,borderRadius:12,padding:"14px 16px",border:`1px solid ${k.color}22`}}>
                <div style={{fontSize:10,color:"#888",textTransform:"uppercase",letterSpacing:".06em",marginBottom:4}}>{k.label}</div>
                <div style={{fontSize:26,fontWeight:700,color:k.color,lineHeight:1}}>{k.value}</div>
                <div style={{fontSize:11,color:"#888",marginTop:4}}>{k.sub}</div>
              </div>
            ))}
          </div>

          {/* ── Chart 1: Attendance Trend (line/bar) ── */}
          <div className="card" style={{padding:20,marginBottom:16}}>
            <div style={{fontWeight:600,fontSize:14,marginBottom:16}}>📊 Attendance Trend — Last {dashData.trend.length} Sessions</div>
            {(()=>{
              const data=dashData.trend;
              const W=600,H=200,PL=40,PR=16,PT=16,PB=48;
              const iW=W-PL-PR,iH=H-PT-PB;
              const maxVal=Math.max(...data.map(d=>d.totalMembers),1);
              const xStep=data.length>1?iW/(data.length-1):iW;
              const yScale=v=>(iH-(v/maxVal*iH));
              const pts=(key)=>data.map((d,i)=>`${PL+(data.length>1?i*xStep:iW/2)},${PT+yScale(d[key])}`).join(" ");
              const area=(key)=>{
                const first=`${PL+(data.length>1?0:iW/2)},${PT+iH}`;
                const last=`${PL+(data.length>1?(data.length-1)*xStep:iW/2)},${PT+iH}`;
                return `${first} ${pts(key)} ${last}`;
              };
              const yLines=[0,25,50,75,100].map(p=>Math.round(maxVal*p/100));
              return(
                <div style={{overflowX:"auto"}}>
                <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",maxWidth:W,display:"block"}}>
                  {/* Grid lines */}
                  {yLines.map(v=>(
                    <g key={v}>
                      <line x1={PL} y1={PT+yScale(v)} x2={W-PR} y2={PT+yScale(v)} stroke="#f0f0f0" strokeWidth="1"/>
                      <text x={PL-4} y={PT+yScale(v)+4} textAnchor="end" fontSize="9" fill="#bbb">{v}</text>
                    </g>
                  ))}
                  {/* Area fills */}
                  <polygon points={area("totalPresent")} fill="#dbeafe" opacity="0.6"/>
                  <polygon points={area("regPresent")} fill="#dcfce7" opacity="0.7"/>
                  <polygon points={area("regAbsent")} fill="#fee2e2" opacity="0.6"/>
                  {/* Lines */}
                  <polyline points={pts("totalPresent")} fill="none" stroke="#1e40af" strokeWidth="2.5" strokeLinejoin="round"/>
                  <polyline points={pts("regPresent")} fill="none" stroke="#15803d" strokeWidth="2" strokeLinejoin="round" strokeDasharray="0"/>
                  <polyline points={pts("regAbsent")} fill="none" stroke="#dc2626" strokeWidth="2" strokeLinejoin="round" strokeDasharray="4 3"/>
                  <polyline points={pts("irrPresent")} fill="none" stroke="#d97706" strokeWidth="1.5" strokeLinejoin="round" strokeDasharray="2 3"/>
                  {/* Dots + labels */}
                  {data.map((d,i)=>{
                    const x=PL+(data.length>1?i*xStep:iW/2);
                    const yP=PT+yScale(d.totalPresent);
                    const yR=PT+yScale(d.regPresent);
                    const yA=PT+yScale(d.regAbsent);
                    const label=d.date.split(" ").slice(0,2).join(" ");
                    return(
                      <g key={i}>
                        <circle cx={x} cy={yP} r="4" fill="#1e40af" stroke="#fff" strokeWidth="1.5"/>
                        <circle cx={x} cy={yR} r="3.5" fill="#15803d" stroke="#fff" strokeWidth="1.5"/>
                        <circle cx={x} cy={yA} r="3.5" fill="#dc2626" stroke="#fff" strokeWidth="1.5"/>
                        <text x={x} y={H-4} textAnchor="middle" fontSize="9" fill="#999" transform={`rotate(-35,${x},${H-4})`}>{label}</text>
                        <text x={x} y={yP-8} textAnchor="middle" fontSize="9" fill="#1e40af" fontWeight="600">{d.totalPresent}</text>
                      </g>
                    );
                  })}
                  {/* Legend */}
                  {[["#1e40af","Total Present"],["#15803d","Regular Present"],["#dc2626","Regular Absent"],["#d97706","Irregular Present"]].map(([c,l],i)=>(
                    <g key={l} transform={`translate(${PL+i*135},${H-10})`}>
                      <line x1="0" y1="-3" x2="14" y2="-3" stroke={c} strokeWidth="2"/>
                      <text x="17" y="0" fontSize="9" fill="#666">{l}</text>
                    </g>
                  ))}
                </svg>
                </div>
              );
            })()}
          </div>

          {/* ── Chart 2: Category Donut + Bar ── */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:16}}>
            {/* Donut */}
            <div className="card" style={{padding:20}}>
              <div style={{fontWeight:600,fontSize:14,marginBottom:14}}>🍩 Category Distribution</div>
              {(()=>{
                const total=dashData.liveR+dashData.liveI+dashData.liveN||1;
                const segs=[
                  {label:"Regular",value:dashData.liveR,color:"#15803d"},
                  {label:"Irregular",value:dashData.liveI,color:"#d97706"},
                  {label:"No",value:dashData.liveN,color:"#dc2626"},
                ];
                const cx=80,cy=80,r=60,inner=36;
                let angle=-Math.PI/2;
                const arcs=segs.map(s=>{
                  const sweep=s.value/total*Math.PI*2;
                  const x1=cx+r*Math.cos(angle),y1=cy+r*Math.sin(angle);
                  angle+=sweep;
                  const x2=cx+r*Math.cos(angle),y2=cy+r*Math.sin(angle);
                  const xi1=cx+inner*Math.cos(angle-sweep),yi1=cy+inner*Math.sin(angle-sweep);
                  const xi2=cx+inner*Math.cos(angle),yi2=cy+inner*Math.sin(angle);
                  const large=sweep>Math.PI?1:0;
                  return{...s,d:`M${x1},${y1} A${r},${r},0,${large},1,${x2},${y2} L${xi2},${yi2} A${inner},${inner},0,${large},0,${xi1},${yi1} Z`,pct:Math.round(s.value/total*100)};
                });
                return(
                  <div style={{display:"flex",alignItems:"center",gap:16,flexWrap:"wrap"}}>
                    <svg width="160" height="160" viewBox="0 0 160 160">
                      {arcs.map(a=><path key={a.label} d={a.d} fill={a.color} opacity="0.9"/>)}
                      <text x={cx} y={cy-6} textAnchor="middle" fontSize="18" fontWeight="700" fill="#1a1a1a">{allMembers.length}</text>
                      <text x={cx} y={cy+12} textAnchor="middle" fontSize="9" fill="#888">Total</text>
                    </svg>
                    <div style={{flex:1}}>
                      {arcs.map(a=>(
                        <div key={a.label} style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                          <div style={{width:12,height:12,borderRadius:3,background:a.color,flexShrink:0}}/>
                          <div style={{flex:1,fontSize:13}}>{a.label}</div>
                          <div style={{fontWeight:700,color:a.color,fontSize:14}}>{a.value}</div>
                          <div style={{fontSize:11,color:"#aaa",width:32,textAlign:"right"}}>{a.pct}%</div>
                        </div>
                      ))}
                    </div>
                  </div>
                );
              })()}
            </div>

            {/* Attendance % bar chart per session */}
            <div className="card" style={{padding:20}}>
              <div style={{fontWeight:600,fontSize:14,marginBottom:14}}>📶 Attendance % per Session</div>
              {(()=>{
                const data=dashData.trend;
                const barW=Math.min(32, Math.floor(220/data.length)-4);
                return(
                  <svg viewBox={`0 0 260 160`} style={{width:"100%",display:"block"}}>
                    {/* 50% and 75% lines */}
                    {[50,75,100].map(p=>(
                      <g key={p}>
                        <line x1="30" y1={140-p*1.1} x2="260" y2={140-p*1.1} stroke="#f0f0f0" strokeWidth="1"/>
                        <text x="26" y={143-p*1.1} textAnchor="end" fontSize="8" fill="#ccc">{p}%</text>
                      </g>
                    ))}
                    {data.map((d,i)=>{
                      const bh=d.pct*1.1;
                      const x=34+i*(barW+4);
                      const fill=d.pct>=75?"#15803d":d.pct>=50?"#d97706":"#dc2626";
                      const label=d.date.split(" ")[0]+"\n"+d.date.split(" ")[1];
                      return(
                        <g key={i}>
                          <rect x={x} y={140-bh} width={barW} height={bh} rx="3" fill={fill} opacity="0.85"/>
                          <text x={x+barW/2} y={135-bh} textAnchor="middle" fontSize="8" fill={fill} fontWeight="600">{d.pct}%</text>
                          <text x={x+barW/2} y={150} textAnchor="middle" fontSize="7.5" fill="#aaa">{d.date.split(" ")[0]}</text>
                          <text x={x+barW/2} y={158} textAnchor="middle" fontSize="7.5" fill="#aaa">{d.date.split(" ")[1]}</text>
                        </g>
                      );
                    })}
                  </svg>
                );
              })()}
            </div>
          </div>

          {/* ── Chart 3: Followup Performance Bars ── */}
          <div className="card" style={{padding:20,marginBottom:16}}>
            <div style={{fontWeight:600,fontSize:14,marginBottom:4}}>🏆 Followup Group Performance <span style={{fontSize:11,color:"#888",fontWeight:400}}>(avg attendance % — last 6 sessions)</span></div>
            <div style={{overflowX:"auto",marginTop:12}}>
              {(()=>{
                const data=dashData.fpPerf;
                const maxAvg=Math.max(...data.map(d=>d.avg),1);
                return(
                  <div style={{minWidth:400}}>
                    {data.map((fp,i)=>(
                      <div key={fp.fp} style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
                        <div style={{width:130,fontSize:11,color:"#555",textAlign:"right",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}} title={fp.fp}>{fp.fp}</div>
                        <div style={{flex:1,background:"#f3f4f6",borderRadius:6,height:20,overflow:"hidden",position:"relative"}}>
                          <div style={{height:"100%",width:`${fp.avg}%`,borderRadius:6,background:fp.avg>=75?"#15803d":fp.avg>=50?"#d97706":"#dc2626",transition:"width .3s"}}/>
                          <span style={{position:"absolute",right:6,top:2,fontSize:10,fontWeight:600,color:fp.avg>=75?"#15803d":fp.avg>=50?"#92400e":"#b91c1c"}}>{fp.avg}%</span>
                        </div>
                        <div style={{width:24,fontSize:11,color:"#aaa"}}>{fp.members}</div>
                      </div>
                    ))}
                    <div style={{display:"flex",gap:16,marginTop:10,fontSize:11,color:"#888"}}>
                      {[["#15803d",">=75% (Good)"],["#d97706","50-74% (Fair)"],["#dc2626","<50% (Needs attention)"]].map(([c,l])=>(
                        <span key={l} style={{display:"flex",alignItems:"center",gap:4}}><span style={{width:10,height:10,borderRadius:2,background:c,display:"inline-block"}}/>{l}</span>
                      ))}
                    </div>
                  </div>
                );
              })()}
            </div>
          </div>

          {/* ── Chart 4: Stacked session composition ── */}
          <div className="card" style={{padding:20,marginBottom:16}}>
            <div style={{fontWeight:600,fontSize:14,marginBottom:14}}>📦 Session Composition — Regular vs Irregular vs No</div>
            {(()=>{
              const data=dashData.trend;
              const W=600,H=180,PL=40,PR=16,PT=10,PB=50;
              const iW=W-PL-PR,iH=H-PT-PB;
              const bW=Math.min(36,Math.floor(iW/data.length)-6);
              return(
                <div style={{overflowX:"auto"}}>
                <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",maxWidth:W,display:"block"}}>
                  {[0,25,50,75,100].map(p=>(
                    <g key={p}>
                      <line x1={PL} y1={PT+iH*(1-p/100)} x2={W-PR} y2={PT+iH*(1-p/100)} stroke="#f3f4f6" strokeWidth="1"/>
                      <text x={PL-4} y={PT+iH*(1-p/100)+4} textAnchor="end" fontSize="9" fill="#ccc">{p}</text>
                    </g>
                  ))}
                  {data.map((d,i)=>{
                    const tot=d.totalMembers||1;
                    const rH=iH*(d.regPresent/tot);
                    const iH2=iH*(d.irrPresent/tot);
                    const nH=iH*(d.noPresent/tot);
                    const x=PL+(iW/(data.length))*(i+0.5)-bW/2;
                    const label=d.date.split(" ").slice(0,2).join(" ");
                    let yOff=PT+iH;
                    const bars=[{h:rH,c:"#15803d"},{h:iH2,c:"#d97706"},{h:nH,c:"#9ca3af"}];
                    return(
                      <g key={i}>
                        {bars.map((b,bi)=>{
                          yOff-=b.h;
                          return <rect key={bi} x={x} y={yOff} width={bW} height={b.h} fill={b.c} opacity="0.85"/>;
                        })}
                        <text x={x+bW/2} y={H-PT-4} textAnchor="middle" fontSize="8.5" fill="#999" transform={`rotate(-35,${x+bW/2},${H-PT-4})`}>{label}</text>
                      </g>
                    );
                  })}
                  {/* Legend */}
                  {[["#15803d","Regular"],["#d97706","Irregular"],["#9ca3af","No Category"]].map(([c,l],i)=>(
                    <g key={l} transform={`translate(${PL+i*120},${H-8})`}>
                      <rect x="0" y="-8" width="10" height="10" rx="2" fill={c}/>
                      <text x="13" y="0" fontSize="9" fill="#666">{l}</text>
                    </g>
                  ))}
                </svg>
                </div>
              );
            })()}
          </div>

          {/* ── Insight cards ── */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(220px,1fr))",gap:12,marginBottom:4}}>
            {dashData.liveR>0&&dashData.trend.length>0&&(()=>{
              const lastRegAbsent=dashData.trend[dashData.trend.length-1].regAbsent;
              return lastRegAbsent>0?(
                <div style={{background:"#fef2f2",border:"1px solid #fecaca",borderRadius:12,padding:16}}>
                  <div style={{fontWeight:600,fontSize:13,color:"#b91c1c",marginBottom:4}}>⚠ Regular Absent Alert</div>
                  <div style={{fontSize:12,color:"#555"}}><b style={{color:"#b91c1c",fontSize:18}}>{lastRegAbsent}</b> regular yuvaks were absent in the last session.</div>
                </div>
              ):( <div style={{background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:12,padding:16}}>
                  <div style={{fontWeight:600,fontSize:13,color:"#15803d",marginBottom:4}}>✅ Great Turnout!</div>
                  <div style={{fontSize:12,color:"#555"}}>All regular yuvaks attended the last session. 🎉</div>
                </div>
              );
            })()}
            {dashData.streak>0&&<div style={{background:"#f5f3ff",border:"1px solid #ddd6fe",borderRadius:12,padding:16}}>
              <div style={{fontWeight:600,fontSize:13,color:"#7c3aed",marginBottom:4}}>🔥 Attendance Streak</div>
              <div style={{fontSize:12,color:"#555"}}><b style={{color:"#7c3aed",fontSize:18}}>{dashData.streak}</b> consecutive session{dashData.streak!==1?"s":""} with over 50% attendance.</div>
            </div>}
            {dashData.fpPerf.length>0&&<div style={{background:"#fffbeb",border:"1px solid #fde68a",borderRadius:12,padding:16}}>
              <div style={{fontWeight:600,fontSize:13,color:"#92400e",marginBottom:4}}>📉 Needs Attention</div>
              {dashData.fpPerf.filter(f=>f.avg<50).length===0
                ?<div style={{fontSize:12,color:"#555"}}>All followup groups above 50% — great work!</div>
                :<div style={{fontSize:12,color:"#555"}}><b>{dashData.fpPerf.filter(f=>f.avg<50).map(f=>f.fp).join(", ")}</b> below 50% avg attendance.</div>}
            </div>}
          </div>
        </>}
      </>}

      {/* ═══════════════════ PANEL TAB ═══════════════════ */}
      {tab==="panel"&&<>

              <button className="btn btn-green" onClick={doSaveEdit}>Save Changes ✓</button>

          </div>
        </div>
      </div>}

      {/* ══ Edit delete confirm modal ══ */}

          <h2 style={{margin:"0 0 8px",fontSize:17}}>Delete Yuvak?</h2>

            ⚠ This is a Master DB member. Deleting removes them from attendance and future sessions, but does not erase their past historic records.
          </p>}
          {editDeleteConfirm.isExtra&&<p style={{fontSize:12,color:"#555",margin:"0 0 16px"}}>This cannot be undone. Their attendance history will remain in the historic records.</p>}
          <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
            <button className="btn btn-gray" onClick={()=>setEditDeleteConfirm(null)}>Cancel</button>
            <button className="btn btn-red" onClick={()=>doDeleteEdit(editDeleteConfirm.name,editDeleteConfirm.isExtra)}>Yes, Delete</button>
          </div>
        </div>
      </div>}

      {/* ══ Followup-wise WhatsApp Modal ══ */}
      {showFPWAModal&&<div className="modal-bg" onClick={()=>setShowFPWAModal(false)}>
        <div style={{background:darkMode?"#1e293b":"#fff",borderRadius:16,maxWidth:520,width:"94%",maxHeight:"88vh",overflowY:"auto",boxShadow:"0 20px 60px rgba(0,0,0,.25)",padding:0}}

          {/* Header */}
          <div style={{background:"#128C7E",borderRadius:"16px 16px 0 0",padding:"18px 22px",color:"#fff",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
            <div>
              <div style={{fontWeight:700,fontSize:16}}>💬 Followup-wise WhatsApp</div>
              <div style={{fontSize:12,opacity:.85,marginTop:2}}>Send per-group reports or one consolidated message</div>
            </div>
            <button onClick={()=>setShowFPWAModal(false)} style={{background:"rgba(255,255,255,.2)",border:"none",borderRadius:8,color:"#fff",fontSize:18,cursor:"pointer",padding:"4px 10px",lineHeight:1}}>✕</button>
          </div>

          {/* Consolidated send banner */}
          <div style={{background:"#f0fdf4",padding:"12px 22px",borderBottom:"1px solid #d1fae5",display:"flex",alignItems:"center",justifyContent:"space-between",gap:10,flexWrap:"wrap"}}>
            <div>
              <div style={{fontWeight:600,fontSize:13,color:"#166534"}}>📤 Consolidated Report</div>
              <div style={{fontSize:11,color:"#4ade80",marginTop:1}}>All {allFollowups.length} groups · summary format · {totalP}P / {totalA}A / {pct}%</div>
            </div>
            <button onClick={doWAConsolidated}
              style={{display:"inline-flex",alignItems:"center",gap:6,padding:"9px 18px",borderRadius:9,border:"none",background:"#25D366",color:"#fff",fontWeight:700,fontSize:13,cursor:"pointer",whiteSpace:"nowrap"}}>
              💬 Send Consolidated
            </button>
          </div>

          {/* Info banner */}
          <div style={{background:"#fffbeb",padding:"8px 22px",fontSize:11,color:"#92400e",borderBottom:"1px solid #fde68a"}}>
            📋 Per-group format below: Regular / Irregular / No · Present + Absent breakdown
          </div>

          {/* Followup group list */}
          <div style={{padding:"12px 16px"}}>
            {allFollowups.map(fp=>{
              const members=allMembers.filter(m=>m.followup===fp);
              const present=members.filter(m=>attendance[m.name]?.status==="P");
              const absent=members.filter(m=>attendance[m.name]?.status!=="P");
              const pct2=members.length>0?Math.round(present.length/members.length*100):0;
              const pColor=pct2>=75?"#15803d":pct2>=50?"#92400e":"#b91c1c";

              // Find coordinator's contact — look for a MASTER member whose name matches the followup label
              const coordinatorMember=allMembers.find(m=>
                m.name.toLowerCase().includes(fp.toLowerCase().split(" ")[0].toLowerCase())&&
                (m.contact||"").length>=10
              );
              const coordContact=coordinatorMember?.contact||"";

              return(
                <div key={fp} style={{border:"1px solid #e5e7eb",borderRadius:12,marginBottom:10,overflow:"hidden"}}>
                  {/* Group header */}
                  <div style={{padding:"12px 16px",background:darkMode?"#0f172a":"#f9f9f7",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
                    <div>
                      <div style={{fontWeight:600,fontSize:13}}>{fp}</div>
                      <div style={{fontSize:11,color:"#888",marginTop:1}}>
                        {members.length} members · {present.length}P / {absent.length}A ·
                        <span style={{color:pColor,fontWeight:600}}> {pct2}%</span>
                      </div>
                      {coordContact&&<div style={{fontSize:10,color:"#16a34a",marginTop:1}}>📞 {coordContact}</div>}
                    </div>
                    {/* Action buttons */}
                    <div style={{display:"flex",gap:6}}>
                      {coordContact&&(
                        <button
                          onClick={()=>{doWAFollowup(fp,coordContact);}}
                          style={{display:"inline-flex",alignItems:"center",gap:5,padding:"7px 14px",borderRadius:8,border:"none",background:"#25D366",color:"#fff",fontWeight:600,fontSize:12,cursor:"pointer"}}>
                          💬 Send to {fp.split(" ")[0]}
                        </button>
                      )}
                      <button
                        onClick={()=>doWAFollowup(fp,null)}
                        style={{display:"inline-flex",alignItems:"center",gap:5,padding:"7px 12px",borderRadius:8,border:"1px solid #25D366",background:"transparent",color:"#25D366",fontWeight:600,fontSize:12,cursor:"pointer"}}
                        title="Share without opening specific contact">
                        🔗 Generic
                      </button>
                    </div>
                  </div>

                  {/* Preview */}
                  <div style={{padding:"10px 16px",display:"flex",gap:12,flexWrap:"wrap",fontSize:12}}>
                    {["R","I","N"].map(cat=>{
                      const pC=present.filter(m=>getCategory(m.name,history)===cat);
                      const aC=absent.filter(m=>getCategory(m.name,history)===cat);
                      const catN=cat==="R"?"Regular":cat==="I"?"Irregular":"No";
                      const catCol=cat==="R"?"#15803d":cat==="I"?"#92400e":"#b91c1c";
                      return(
                        <div key={cat} style={{flex:1,minWidth:80}}>
                          <div style={{fontWeight:600,color:catCol,fontSize:11,marginBottom:4}}>{catN}</div>
                          <div style={{fontSize:11,color:"#16a34a"}}>✅ {pC.length} present</div>
                          <div style={{fontSize:11,color:"#b91c1c"}}>❌ {aC.length} absent</div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })}
          </div>

          <div style={{padding:"12px 22px",borderTop:"1px solid #f0f0f0",fontSize:11,color:"#aaa"}}>
            "Send to [Name]" opens that coordinator's WhatsApp chat directly · "Generic" opens WhatsApp share without a specific contact
          </div>
        </div>
      </div>}

      {/* ══ Submit modal ══ */}
      {showSubmit&&<div className="modal-bg" onClick={()=>setShowSubmit(false)}>
        <div className="modal" onClick={e=>e.stopPropagation()}>
          <h2 style={{margin:"0 0 8px",fontSize:17}}>Submit Attendance</h2>
          <p style={{fontSize:13,color:"#666",margin:"0 0 10px"}}>Session: <b>{sessionDate}</b> · <b>{sabhaType}</b></p>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:14}}>
            <div className="stat-card"><div className="stat-label">Present</div><div className="stat-num" style={{color:"#15803d"}}>{totalP}</div></div>
            <div className="stat-card"><div className="stat-label">Absent</div><div className="stat-num" style={{color:"#b91c1c"}}>{totalA}</div></div>
            <div className="stat-card"><div className="stat-label">Unmarked</div><div className="stat-num" style={{color:"#888"}}>{allMembers.length-totalMarked}</div></div>
          </div>
          <div style={{marginBottom:16}}>
            <label className="form-label">Session Note (optional)</label>
            <input className="form-input" placeholder="e.g. Janmashtami special, heavy rain..." value={sessionNote} onChange={e=>setSessionNote(e.target.value)}/>
          </div>
          <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
            <button className="btn btn-gray" onClick={()=>setShowSubmit(false)}>Cancel</button>
            <button className="btn btn-green" onClick={()=>{doSubmit();setTimeout(genExcel,400);}}>Submit + Excel</button>
            <button className="btn btn-purple" onClick={doSubmit}>Submit Only</button>
          </div>
        </div>
      </div>}

      {/* ══ Reset modal ══ */}
      {showReset&&<div className="modal-bg" onClick={()=>setShowReset(false)}>
        <div className="modal" onClick={e=>e.stopPropagation()}>
          <h2 style={{margin:"0 0 8px",fontSize:17}}>Reset Attendance?</h2>
          <p style={{fontSize:13,color:"#666",margin:"0 0 18px"}}>All Present / Absent marks will be cleared for the next session. Make sure you have submitted or exported first.</p>
          <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
            <button className="btn btn-gray" onClick={()=>setShowReset(false)}>Cancel</button>
            <button className="btn btn-red" onClick={doReset}>Yes, Reset</button>
          </div>
        </div>
      </div>}

      {/* ══ Delete confirm modal (registered yuvaks tab) ══ */}
      {regDeleteConfirm&&<div className="modal-bg" onClick={()=>setRegDeleteConfirm(null)}>
        <div className="modal" onClick={e=>e.stopPropagation()}>
          <h2 style={{margin:"0 0 8px",fontSize:17}}>Remove Yuvak?</h2>
          <p style={{fontSize:13,color:"#666",margin:"0 0 18px"}}><b>{regDeleteConfirm}</b> will be removed from the database. This cannot be undone.</p>
          <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
            <button className="btn btn-gray" onClick={()=>setRegDeleteConfirm(null)}>Cancel</button>
            <button className="btn btn-red" onClick={()=>doDeleteReg(regDeleteConfirm)}>Yes, Remove</button>
          </div>
        </div>
      </div>}

      {/* ═══════════════════ MONTHLY SUMMARY TAB ═══════════════════ */}
      {tab==="monthly"&&<>
        <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:16,alignItems:"center"}}>
          <select className="input-s" value={monthlyFP} onChange={e=>setMonthlyFP(e.target.value)} style={{width:"auto"}}>
            <option>All</option>
            {allFollowups.map(f=><option key={f}>{f}</option>)}
          </select>
          <button className="btn btn-green" onClick={genHistExcel}>⬇ Export Full Excel</button>
          <span style={{fontSize:12,color:"#888",marginLeft:"auto"}}>{monthlySummary.length} month{monthlySummary.length!==1?"s":""} on record</span>
        </div>

        {monthlySummary.length===0&&<div className="card" style={{padding:40,textAlign:"center",color:"#aaa"}}>No sessions submitted yet. Submit attendance to see monthly summaries.</div>}

        {monthlySummary.map(mon=>{
          const filtMembers=monthlyFP==="All"?allMembers:allMembers.filter(m=>m.followup===monthlyFP);
          const fpSessions=mon.sessions;
          const fpPresent=fpSessions.map(s=>s.records.filter(r=>filtMembers.some(m=>m.name===r.name)&&r.status==="P").length);
          const fpAvg=fpSessions.length>0?Math.round(fpPresent.reduce((a,b)=>a+b,0)/fpSessions.length):0;
          const fpMax=fpPresent.length?Math.max(...fpPresent):0;
          const fpMin=fpPresent.length?Math.min(...fpPresent):0;
          const fpBestDate=fpSessions[fpPresent.indexOf(fpMax)]?.date||"";
          const fpWorstDate=fpSessions[fpPresent.indexOf(fpMin)]?.date||"";
          return(
            <div key={mon.key} className="card" style={{marginBottom:14,overflow:"hidden"}}>
              <div style={{background:"#1e1e1e",color:"#fff",padding:"12px 18px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
                <div style={{fontWeight:700,fontSize:16}}>{mon.key}</div>
                <div style={{fontSize:12,color:"#94a3b8"}}>{fpSessions.length} session{fpSessions.length!==1?"s":""}</div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(120px,1fr))",gap:0,borderBottom:"1px solid #f0f0f0"}}>
                {[["Avg Present",fpAvg,"#15803d"],["Best Session",fpMax,"#1e40af"],["Worst Session",fpMin,"#b91c1c"],["Avg %",filtMembers.length>0?Math.round(fpAvg/filtMembers.length*100)+"%":"—","#92400e"]].map(([l,v,c])=>(
                  <div key={l} style={{padding:"14px 18px",borderRight:"1px solid #f0f0f0"}}>
                    <div style={{fontSize:10,color:"#888",textTransform:"uppercase",letterSpacing:".06em",marginBottom:4}}>{l}</div>
                    <div style={{fontSize:22,fontWeight:700,color:c}}>{v}</div>
                  </div>
                ))}
              </div>
              <div style={{padding:"10px 18px",display:"flex",gap:16,flexWrap:"wrap",fontSize:12,color:"#555"}}>
                <span>🏆 Best: <b>{fpBestDate}</b> ({fpMax} present)</span>
                <span>📉 Lowest: <b>{fpWorstDate}</b> ({fpMin} present)</span>
              </div>
              {/* Session breakdown */}
              <div style={{padding:"0 18px 14px"}}>
                <div style={{fontSize:11,color:"#888",fontWeight:600,textTransform:"uppercase",letterSpacing:".06em",marginBottom:8}}>Session breakdown</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                  {fpSessions.map((s,i)=>{
                    const cnt=s.records.filter(r=>filtMembers.some(m=>m.name===r.name)&&r.status==="P").length;
                    const pct2=filtMembers.length>0?Math.round(cnt/filtMembers.length*100):0;
                    const bg=pct2>=75?"#dcfce7":pct2>=50?"#fef9c3":"#fee2e2";
                    const col=pct2>=75?"#15803d":pct2>=50?"#92400e":"#b91c1c";
                    return(
                      <div key={s.date} style={{background:bg,borderRadius:8,padding:"6px 10px",fontSize:11,textAlign:"center",minWidth:80}}>
                        <div style={{fontWeight:600,color:col}}>{cnt} / {filtMembers.length}</div>
                        <div style={{color:"#888",marginTop:1}}>{s.date}</div>
                        {s.sabhaType&&s.sabhaType!=="Weekly"&&<div style={{fontSize:9,color:"#7c3aed",marginTop:1}}>{s.sabhaType}</div>}
                        {s.note&&<div style={{fontSize:9,color:"#555",marginTop:1,maxWidth:80,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}} title={s.note}>📝 {s.note}</div>}
                      </div>
                    );
                  })}
                </div>
              </div>
              {/* Top 5 for this month */}
              <div style={{padding:"0 18px 16px"}}>
                <div style={{fontSize:11,color:"#888",fontWeight:600,textTransform:"uppercase",letterSpacing:".06em",marginBottom:8}}>🏅 Top attenders this month</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                  {filtMembers.map(m=>({
                    name:m.name,
                    cnt:fpSessions.filter(s=>s.records.find(r=>r.name===m.name&&r.status==="P")).length
                  })).sort((a,b)=>b.cnt-a.cnt).slice(0,5).map((m,i)=>(
                    <div key={m.name} style={{background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:8,padding:"5px 10px",fontSize:12,cursor:"pointer"}} onClick={()=>setProfileMember(m.name)}>
                      <span style={{color:"#888",fontSize:10}}>{i+1}. </span><b>{m.name.split(" ")[0]}</b>
                      <span style={{color:"#15803d",marginLeft:4,fontWeight:600}}>{m.cnt}/{fpSessions.length}</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          );
        })}
      </>}

      {/* ═══════════════════ PREDICT TAB ═══════════════════ */}
      {tab==="predict"&&<>
        <div style={{fontSize:13,color:darkMode?"#94a3b8":"#666",marginBottom:16}}>
          Based on last 6 sessions, yuvaks whose attendance is <b>dropping</b> are flagged as at-risk. Higher risk score = more urgent attention needed.
        </div>
        {predictionList.length===0&&<div className="card" style={{padding:40,textAlign:"center",color:"#aaa"}}>
          <div style={{fontSize:32,marginBottom:8}}>✅</div>
          <div style={{fontWeight:600}}>No at-risk yuvaks detected</div>
          <div style={{fontSize:12,marginTop:4}}>Need at least 2 sessions of data to calculate trends.</div>
        </div>}
        {predictionList.length>0&&<>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:8,marginBottom:14}}>
            {[["At-Risk Yuvaks",predictionList.length,"#b91c1c"],["High Risk (5+)",predictionList.filter(m=>m.riskScore>=5).length,"#7c2d12"],["Regular At-Risk",predictionList.filter(m=>m.cat==="R").length,"#92400e"]].map(([l,v,c])=>(
              <div key={l} className="stat-card"><div className="stat-label">{l}</div><div className="stat-num" style={{color:c}}>{v}</div></div>
            ))}
          </div>
          <div className="card" style={{overflow:"hidden"}}>
            <div style={{display:"flex",padding:"8px 14px",background:darkMode?"#1e293b":"#f9f9f7",fontSize:10,color:"#888",fontWeight:700,textTransform:"uppercase",letterSpacing:".07em",borderBottom:"1px solid #f0f0f0"}}>
              <span style={{flex:1}}>Member</span>
              <span style={{width:70,textAlign:"center"}}>Category</span>
              <span style={{width:80,textAlign:"center"}}>Prev 3 sess</span>
              <span style={{width:80,textAlign:"center"}}>Last 3 sess</span>
              <span style={{width:65,textAlign:"center"}}>Risk</span>
            </div>
            {predictionList.map(m=>(
              <div key={m.name} className="row-hover" style={{display:"flex",alignItems:"center",padding:"10px 14px",borderBottom:"1px solid #f5f5f5",cursor:"pointer"}} onClick={()=>setProfileMember(m.name)}>
                <div style={{flex:1}}>
                  <div style={{fontWeight:500,fontSize:13}}>{m.name}</div>
                  <div style={{fontSize:11,color:"#888"}}>{m.followup}</div>
                </div>
                <div style={{width:70,textAlign:"center"}}><span className={`badge badge-${m.cat}`}>{m.cat==="R"?"Regular":m.cat==="I"?"Irregular":"No"}</span></div>
                <div style={{width:80,textAlign:"center",fontWeight:600,color:"#15803d"}}>{m.prev3}/3</div>
                <div style={{width:80,textAlign:"center",fontWeight:600,color:"#dc2626"}}>{m.last3}/3</div>
                <div style={{width:65,textAlign:"center"}}>
                  <span style={{background:m.riskScore>=5?"#fef2f2":"#fffbeb",color:m.riskScore>=5?"#b91c1c":"#92400e",padding:"2px 8px",borderRadius:6,fontSize:11,fontWeight:700}}>{m.riskScore>=5?"🔴 High":"🟡 Med"}</span>
                </div>
              </div>
            ))}
          </div>
          <div style={{marginTop:10,fontSize:11,color:"#aaa"}}>Click any row to view full profile. Risk score is based on attendance drop over last 6 sessions.</div>
        </>}
      </>}

      {/* ═══════════════════ ACTION TAB ═══════════════════ */}
      {tab==="action"&&<>
        <div style={{fontSize:13,color:darkMode?"#94a3b8":"#666",marginBottom:16}}>
          Yuvaks who dropped category or missed 3+ consecutive sessions. Assign personal follow-up calls immediately.
        </div>
        {actionList.length===0&&<div className="card" style={{padding:40,textAlign:"center",color:"#aaa"}}>
          <div style={{fontSize:32,marginBottom:8}}>🎉</div>
          <div style={{fontWeight:600}}>No action required right now</div>
          <div style={{fontSize:12,marginTop:4}}>No yuvaks have dropped category or have 3+ consecutive absences.</div>
        </div>}
        {actionList.length>0&&<>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:8,marginBottom:14}}>
            {[["Total Actions",actionList.length,"#dc2626"],["Category Drops",actionList.filter(m=>m.action==="Category Drop").length,"#7c2d12"],["3+ Absent",actionList.filter(m=>m.action==="3+ Consecutive Absent").length,"#92400e"]].map(([l,v,c])=>(
              <div key={l} className="stat-card"><div className="stat-label">{l}</div><div className="stat-num" style={{color:c}}>{v}</div></div>
            ))}
          </div>
          {["Category Drop","3+ Consecutive Absent"].map(actionType=>{
            const items=actionList.filter(m=>m.action===actionType);

            return(
              <div key={actionType} style={{marginBottom:16}}>
                <div style={{fontWeight:600,fontSize:13,marginBottom:8,color:actionType==="Category Drop"?"#7c2d12":"#92400e"}}>
                  {actionType==="Category Drop"?"📉 Category Drops":"⏰ 3+ Consecutive Absences"} ({items.length})
                </div>
                <div className="card" style={{overflow:"hidden"}}>
                  {items.map(m=>{
                    const mem=allMembers.find(x=>x.name===m.name);

                      <div key={m.name} className="row-hover" style={{display:"flex",alignItems:"center",gap:10,padding:"11px 14px",borderBottom:"1px solid #f5f5f5"}}>
                        <div style={{flex:1,cursor:"pointer"}} onClick={()=>setProfileMember(m.name)}>
                          <div style={{fontWeight:500,fontSize:13}}>{m.name}</div>
                          <div style={{fontSize:11,color:"#888",marginTop:1}}>{m.followup}
                            {m.action==="Category Drop"&&<span style={{marginLeft:8,color:"#b91c1c",fontSize:10}}>
                              {m.catPrev==="R"?"Regular":m.catPrev==="I"?"Irregular":"No"} -> {m.catNow==="R"?"Regular":m.catNow==="I"?"Irregular":"No"}
                            </span>}
                            {m.action==="3+ Consecutive Absent"&&<span style={{marginLeft:8,color:"#b91c1c",fontSize:10}}>{m.consAbsent} consecutive absences</span>}

                          <a href={`tel:${mem.contact}`} className="btn btn-green" style={{textDecoration:"none",padding:"5px 10px",fontSize:12}}>📞</a>
                          <button className="btn btn-wa" style={{padding:"5px 10px",fontSize:12}} onClick={()=>doWAAbsent(mem)}>💬</button>
                        </div>}
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })}
        </>}
      </>}

      {/* ═══════════════════ YEAR-OVER-YEAR / COMPARE TAB ═══════════════════ */}
      {tab==="yoy"&&<>
        <div style={{fontSize:13,color:darkMode?"#94a3b8":"#666",marginBottom:16}}>Compare attendance between any two custom date ranges — e.g. this month vs last month, or this year vs last year.</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:20}}>
          {/* Range 1 */}
          <div className="card" style={{padding:18,borderLeft:"4px solid #1e40af"}}>
