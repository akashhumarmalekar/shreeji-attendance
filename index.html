            <div style={{display:"flex",gap:8,flexDirection:"column"}}>
              <div><label className="form-label">From</label><input type="date" className="form-input" value={yoyRange1From} onChange={e=>setYoyRange1From(e.target.value)}/></div>
              <div><label className="form-label">To</label><input type="date" className="form-input" value={yoyRange1To} onChange={e=>setYoyRange1To(e.target.value)}/></div>
            </div>
          </div>
          {/* Range 2 */}
          <div className="card" style={{padding:18,borderLeft:"4px solid #15803d"}}>
            <div style={{fontWeight:600,fontSize:13,color:"#15803d",marginBottom:10}}>Range B</div>
            <div style={{display:"flex",gap:8,flexDirection:"column"}}>
              <div><label className="form-label">From</label><input type="date" className="form-input" value={yoyRange2From} onChange={e=>setYoyRange2From(e.target.value)}/></div>
              <div><label className="form-label">To</label><input type="date" className="form-input" value={yoyRange2To} onChange={e=>setYoyRange2To(e.target.value)}/></div>
            </div>
          </div>
        </div>

        {/* Comparison cards */}
        {(yoyRange1From||yoyRange1To||yoyRange2From||yoyRange2To)&&<>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))",gap:10,marginBottom:16}}>
            {[
              {label:"Sessions",a:yoyData.r1.sessions,b:yoyData.r2.sessions},
              {label:"Avg Present",a:yoyData.r1.avgPresent,b:yoyData.r2.avgPresent},
              {label:"Avg %",a:yoyData.r1.avgPct+"%",b:yoyData.r2.avgPct+"%"},
            ].map(({label,a,b})=>{
              const aNum=parseInt(a),bNum=parseInt(b);
              const aWins=!isNaN(aNum)&&!isNaN(bNum)&&aNum>bNum;
              const bWins=!isNaN(aNum)&&!isNaN(bNum)&&bNum>aNum;
              return(
                <div key={label} className="card" style={{padding:16,textAlign:"center"}}>
                  <div style={{fontSize:10,color:"#888",textTransform:"uppercase",letterSpacing:".06em",marginBottom:10}}>{label}</div>
                  <div style={{display:"flex",justifyContent:"space-around",alignItems:"center",gap:8}}>
                    <div style={{flex:1}}>
                      <div style={{fontSize:11,color:"#1e40af",fontWeight:600,marginBottom:2}}>Range A</div>
                      <div style={{fontSize:22,fontWeight:700,color:aWins?"#15803d":bWins?"#b91c1c":"#1e40af"}}>{a}{aWins?" 🏆":""}</div>
                    </div>
                    <div style={{fontSize:16,color:"#ddd"}}>vs</div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:11,color:"#15803d",fontWeight:600,marginBottom:2}}>Range B</div>
                      <div style={{fontSize:22,fontWeight:700,color:bWins?"#15803d":aWins?"#b91c1c":"#15803d"}}>{b}{bWins?" 🏆":""}</div>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>

          {/* Side-by-side bar charts */}
          {(yoyData.raw1.length>0||yoyData.raw2.length>0)&&<div className="card" style={{padding:20}}>
            <div style={{fontWeight:600,fontSize:13,marginBottom:14}}>Session-by-session comparison</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              {[{label:"Range A",sessions:yoyData.raw1,color:"#1e40af"},{label:"Range B",sessions:yoyData.raw2,color:"#15803d"}].map(({label,sessions,color})=>(
                <div key={label}>
                  <div style={{fontSize:11,fontWeight:600,color,marginBottom:8}}>{label} ({sessions.length} sessions)</div>
                  {sessions.length===0&&<div style={{fontSize:12,color:"#aaa"}}>No sessions in this range.</div>}
                  {sessions.map((s,i)=>{
                    const cnt=s.records.filter(r=>r.status==="P").length;
                    const pct2=allMembers.length?Math.round(cnt/allMembers.length*100):0;
                    return(
                      <div key={i} style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                        <div style={{width:80,fontSize:10,color:"#888",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{s.date.split(" ").slice(0,2).join(" ")}</div>
                        <div style={{flex:1,background:"#f3f4f6",borderRadius:4,height:16,overflow:"hidden"}}>
                          <div style={{height:"100%",width:`${pct2}%`,background:color,borderRadius:4,opacity:0.85}}/>
                        </div>
                        <div style={{width:36,fontSize:11,fontWeight:600,color,textAlign:"right"}}>{pct2}%</div>
                      </div>
                    );
                  })}
                </div>
              ))}
            </div>
          </div>}
        </>}
        {(!yoyRange1From&&!yoyRange1To&&!yoyRange2From&&!yoyRange2To)&&
          <div className="card" style={{padding:36,textAlign:"center",color:"#aaa"}}>Select date ranges above to compare.</div>}
      </>}

      {/* ══ Print modal ══ */}
      {showPrintModal&&<div className="modal-bg" onClick={()=>setShowPrintModal(false)}>
        <div className="modal" onClick={e=>e.stopPropagation()}>
          <h2 style={{margin:"0 0 10px",fontSize:17}}>🖨 Print / Save Report</h2>
          <p style={{fontSize:13,color:"#666",margin:"0 0 16px"}}>Generates a print-ready A4 report with: today's attendance, followup summary, present/absent lists, and dashboard snapshot.</p>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:18}}>
            <div className="stat-card"><div className="stat-label">Present</div><div className="stat-num" style={{color:"#15803d"}}>{totalP}</div></div>
            <div className="stat-card"><div className="stat-label">Absent</div><div className="stat-num" style={{color:"#b91c1c"}}>{totalA}</div></div>
            <div className="stat-card"><div className="stat-label">Sabha</div><div style={{fontSize:13,fontWeight:600,marginTop:4}}>{sabhaType}</div></div>
          </div>
          <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
            <button className="btn btn-gray" onClick={()=>setShowPrintModal(false)}>Cancel</button>
            <button className="btn btn-blue" onClick={doPrintReport}>Open Print View</button>
          </div>
        </div>
      </div>}

      {/* ═══════════════════ SETTINGS TAB ═══════════════════ */}
      {tab==="settings"&&<>
        <div style={{display:"flex",gap:0,borderBottom:"1px solid #eee",marginBottom:20}}>
          {[["general","⚙️ General"],["pin","🔒 PIN Lock"],["backup","💾 Backup"]].map(([id,label])=>(
            <button key={id} onClick={()=>setSettingsTab(id)}
              style={{padding:"8px 18px",border:"none",borderBottom:`2px solid ${settingsTab===id?"#1a1a1a":"transparent"}`,background:"transparent",fontSize:13,fontWeight:settingsTab===id?600:400,cursor:"pointer",color:settingsTab===id?"#1a1a1a":"#888",marginBottom:-1}}>
              {label}
            </button>
          ))}
        </div>

        {settingsTab==="general"&&<>
          <div className="card" style={{padding:20,marginBottom:14}}>
            <div style={{fontWeight:600,fontSize:14,marginBottom:14}}>Appearance</div>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <div>
                <div style={{fontWeight:500,fontSize:13}}>Dark Mode</div>
                <div style={{fontSize:12,color:"#888"}}>Easy on the eyes for night-time use</div>
              </div>
              <button onClick={()=>setDarkMode(d=>!d)}
                style={{padding:"8px 18px",borderRadius:20,border:"none",background:darkMode?"#15803d":"#e5e7eb",color:darkMode?"#fff":"#374151",fontWeight:600,fontSize:13,cursor:"pointer",transition:"all .2s"}}>
                {darkMode?"🌙 Dark ON":"☀️ Light"}
              </button>
            </div>
          </div>
          <div className="card" style={{padding:20,marginBottom:14}}>
            <div style={{fontSize:13,color:"#555",marginBottom:10}}>Current session type:
              <select value={sabhaType} onChange={e=>{setSabhaType(e.target.value);localStorage.setItem(LS_SABHA,e.target.value);}}
                style={{marginLeft:8,padding:"4px 10px",borderRadius:7,border:"1px solid #ddd",fontSize:13}}>
                {["Weekly","Monthly","Special","Yuva Shibir","Festival"].map(t=><option key={t}>{t}</option>)}
              </select>
            </div>
          </div>
          <div className="card" style={{padding:20,marginBottom:14}}>
            <div style={{fontWeight:600,fontSize:14,marginBottom:10}}>Database Stats</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:10}}>
              {[["Total Yuvaks",allMembers.length,"#1a1a1a"],["Master DB",MASTER.length,"#1e40af"],["Registered",extraMembers.length,"#7c3aed"],["Sessions Recorded",prevHistory.length,"#15803d"]].map(([l,v,c])=>(
                <div key={l} className="stat-card"><div className="stat-label">{l}</div><div className="stat-num" style={{color:c}}>{v}</div></div>
              ))}
            </div>
          </div>
          <div className="card" style={{padding:20}}>
            <div style={{fontWeight:600,fontSize:14,marginBottom:10}}>Top 10 Most Regular Yuvaks</div>
            <div style={{overflowX:"auto"}}>
              <table style={{fontSize:13}}>
                <thead><tr><th style={{width:32}}>#</th><th>Name</th><th>Followup</th><th style={{width:70}}>Category</th><th style={{width:70}}>Sessions ✅</th></tr></thead>
                <tbody>{topYuvaks.map((m,i)=>(
                  <tr key={m.name} style={{cursor:"pointer"}} onClick={()=>setProfileMember(m.name)}>
                    <td style={{textAlign:"center",color:"#f59e0b",fontWeight:700}}>{i===0?"🥇":i===1?"🥈":i===2?"🥉":i+1}</td>
                    <td style={{fontWeight:500}}>{m.name}</td>
                    <td style={{fontSize:12,color:"#555"}}>{m.followup}</td>
                    <td style={{textAlign:"center"}}><span className={`badge badge-${m.cat}`}>{m.cat==="R"?"Regular":m.cat==="I"?"Irregular":"No"}</span></td>
                    <td style={{textAlign:"center",fontWeight:600,color:"#15803d"}}>{m.totalP}</td>
                  </tr>
                ))}</tbody>
              </table>
            </div>
          </div>
        </>}

        {settingsTab==="pin"&&<>
          <div className="card" style={{padding:24,marginBottom:14}}>
            <div style={{fontWeight:600,fontSize:14,marginBottom:6}}>🔒 PIN Lock</div>
            <div style={{fontSize:13,color:"#666",marginBottom:16}}>{pin?"PIN is set. The app will ask for PIN on every open.":"No PIN set. Anyone can open the app freely."}</div>
            {pin&&<div style={{display:"flex",gap:10,marginBottom:16}}>
              <button className="btn btn-red" onClick={doRemovePin}>Remove PIN</button>
              <button className="btn btn-gray" onClick={()=>setShowPinSetup(true)}>Change PIN</button>
            </div>}
            {!pin&&<button className="btn btn-blue" onClick={()=>setShowPinSetup(true)}>Set PIN</button>}
            {showPinSetup&&<div style={{marginTop:16,borderTop:"1px solid #eee",paddingTop:16}}>
              <div className="form-grid">
                <div>
                  <label className="form-label">New PIN (min 4 digits)</label>
                  <input type="password" className="form-input" placeholder="Enter new PIN" maxLength={8} value={pinSetupVal} onChange={e=>setPinSetupVal(e.target.value)}/>
                </div>
                <div>
                  <label className="form-label">Confirm PIN</label>
                  <input type="password" className="form-input" placeholder="Re-enter PIN" maxLength={8} value={pinSetupConfirm} onChange={e=>setPinSetupConfirm(e.target.value)}/>
                </div>
              </div>
              <div style={{display:"flex",gap:8,marginTop:12}}>
                <button className="btn btn-gray" onClick={()=>{setShowPinSetup(false);setPinSetupVal("");setPinSetupConfirm("");}}>Cancel</button>
                <button className="btn btn-green" onClick={doSetPin}>Save PIN</button>
              </div>
            </div>}
          </div>
        </>}

        {settingsTab==="backup"&&<>
          <div className="card" style={{padding:24,marginBottom:14}}>
            <div style={{fontWeight:600,fontSize:14,marginBottom:6}}>💾 Export Backup</div>
            <div style={{fontSize:13,color:"#666",marginBottom:16}}>Download all your data (attendance, history, members, settings) as a JSON file. Store it safely — you can restore it anytime.</div>
            <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
              <button className="btn btn-blue" onClick={doBackup}>⬇ Download Backup JSON</button>
              <button className="btn btn-green" onClick={genHistExcel}>⬇ Export Full Historic Excel</button>
            </div>
          </div>
          <div className="card" style={{padding:24}}>
            <div style={{fontWeight:600,fontSize:14,marginBottom:6}}>📂 Restore from Backup</div>
            <div style={{fontSize:13,color:"#dc2626",background:"#fef2f2",borderRadius:8,padding:"10px 14px",marginBottom:14}}>⚠ Restoring will overwrite your current data. Make a backup first if needed.</div>
            <label style={{display:"inline-flex",alignItems:"center",gap:8,padding:"9px 16px",background:"#f4f4f0",borderRadius:8,cursor:"pointer",fontWeight:500,fontSize:13,border:"1px solid #ddd"}}>
              📁 Choose Backup File
              <input type="file" accept=".json" onChange={doRestore} style={{display:"none"}}/>
            </label>
          </div>
        </>}
      </>}

      {/* ══ Profile Drawer ══ */}
      {profileMember&&(()=>{
        const pd=getProfileData(profileMember);
        if(!pd) return null;
        const {m,cat,totalP:tp,totalS:ts,pct:pc,recentP,recentS,recentPct,sessions}=pd;
        return(
          <div className="modal-bg" onClick={()=>setProfileMember(null)}>
            <div style={{background:"#fff",borderRadius:16,maxWidth:540,width:"94%",maxHeight:"90vh",overflowY:"auto",boxShadow:"0 20px 60px rgba(0,0,0,.2)"}}
              onClick={e=>e.stopPropagation()}>
              {/* Header */}
              <div style={{background:"#1e1e1e",borderRadius:"16px 16px 0 0",padding:"20px 22px",color:"#fff"}}>
                <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between"}}>
                  <div>
                    <div style={{fontSize:18,fontWeight:700}}>{m.name}</div>
                    <div style={{fontSize:12,color:"#94a3b8",marginTop:2}}>{m.followup}</div>
                    {m.contact&&<div style={{fontSize:12,color:"#94a3b8"}}>📞 {m.contact}</div>}
                    {m.isExtra&&m.dob&&<div style={{fontSize:12,color:"#94a3b8"}}>🎂 {m.dob}</div>}
                    {(m.isExtra?m.address:getExtra(m.name,"address"))&&<div style={{fontSize:12,color:"#94a3b8",marginTop:2}}>📍 {m.isExtra?m.address:getExtra(m.name,"address")}</div>}
                    {m.isExtra&&m.reference&&<div style={{fontSize:12,color:"#94a3b8"}}>👤 Ref: {m.reference}</div>}
                  </div>
                  <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6}}>
                    <span className={`badge badge-${cat}`} style={{fontSize:12,padding:"4px 12px"}}>{cat==="R"?"Regular":cat==="I"?"Irregular":"No"}</span>
                    {catOverrides[m.name]&&<span style={{fontSize:10,color:"#a78bfa",background:"rgba(124,58,237,.15)",borderRadius:4,padding:"2px 7px"}}>✏️ Manual</span>}
                    <select
                      value={catOverrides[m.name]||"auto"}
                      onChange={e=>doSetCatOverride(m.name,e.target.value)}
                      style={{padding:"4px 8px",borderRadius:7,border:`1.5px solid ${catOverrides[m.name]?"#a78bfa":"rgba(255,255,255,.3)"}`,fontSize:11,fontWeight:600,cursor:"pointer",background:"rgba(255,255,255,.12)",color:"#fff",outline:"none",marginTop:2}}>
                      <option value="auto" style={{color:"#1a1a1a"}}>Auto (by attendance)</option>
                      <option value="R" style={{color:"#1a1a1a"}}>Regular</option>
                      <option value="I" style={{color:"#1a1a1a"}}>Irregular</option>
                      <option value="N" style={{color:"#1a1a1a"}}>No</option>
                    </select>
                  </div>
                </div>
              </div>
              {/* Stats */}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:0,borderBottom:"1px solid #f0f0f0"}}>
                {[["All-time ✅",tp,"#15803d"],[`Last ${recentS} sess`,recentP,"#1e40af"],["Overall %",pc+"%",pc>=70?"#15803d":pc>=40?"#92400e":"#b91c1c"],["Recent %",recentPct+"%",recentPct>=70?"#15803d":recentPct>=40?"#92400e":"#b91c1c"]].map(([l,v,c])=>(
                  <div key={l} style={{padding:"14px 10px",textAlign:"center",borderRight:"1px solid #f0f0f0"}}>
                    <div style={{fontSize:9,color:"#888",textTransform:"uppercase",letterSpacing:".05em",marginBottom:4}}>{l}</div>
                    <div style={{fontSize:20,fontWeight:700,color:c}}>{v}</div>
                  </div>
                ))}
              </div>
              {/* Contact actions */}
              {m.contact&&<div style={{padding:"12px 22px",display:"flex",gap:8,borderBottom:"1px solid #f0f0f0"}}>
                <a href={`tel:${m.contact}`} className="btn btn-green" style={{textDecoration:"none",flex:1,justifyContent:"center"}}>📞 Call</a>
                <button className="btn btn-wa" style={{flex:1}} onClick={()=>doWAAbsent(m)}>💬 WhatsApp</button>
              </div>}
              {/* Journey Timeline */}
              <div style={{padding:"0 22px 16px"}}>
                <div style={{fontWeight:600,fontSize:13,marginBottom:10}}>🗺 Category Journey</div>
                {(()=>{
                  const journey=getJourney(m.name);
                  if(!journey.length) return <div style={{color:"#aaa",fontSize:12}}>No history yet.</div>;
                  const catColor={R:"#15803d",I:"#d97706",N:"#dc2626"};
                  const catLabel={R:"Regular",I:"Irregular",N:"No"};
                  // Group consecutive same-cat segments
                  const segments=[];
                  journey.forEach((j,i)=>{
                    if(!segments.length||segments[segments.length-1].cat!==j.cat){
                      segments.push({cat:j.cat,from:j.date,to:j.date,count:1,present:j.present?1:0});
                    } else {
                      segments[segments.length-1].to=j.date;
                      segments[segments.length-1].count++;
                      if(j.present) segments[segments.length-1].present++;
                    }
                  });
                  return(
                    <div style={{overflowX:"auto"}}>
                      <div style={{display:"flex",alignItems:"center",minWidth:320,gap:0}}>
                        {segments.map((seg,i)=>(
                          <div key={i} style={{flex:seg.count,minWidth:40,position:"relative"}}>
                            <div style={{height:24,background:catColor[seg.cat],opacity:0.85,borderRadius:i===0?"6px 0 0 6px":i===segments.length-1?"0 6px 6px 0":"0",margin:"0 1px",display:"flex",alignItems:"center",justifyContent:"center"}}>
                              <span style={{fontSize:9,color:"#fff",fontWeight:700}}>{catLabel[seg.cat][0]}</span>
                            </div>
                            <div style={{fontSize:8,color:"#888",textAlign:"center",marginTop:2,whiteSpace:"nowrap"}}>{seg.from.split(" ").slice(0,2).join(" ")}</div>
                          </div>
                        ))}
                      </div>
                      <div style={{display:"flex",gap:12,marginTop:8}}>
                        {Object.entries(catLabel).map(([k,v])=>(
                          <span key={k} style={{fontSize:10,display:"flex",alignItems:"center",gap:4}}>
                            <span style={{width:10,height:10,borderRadius:2,background:catColor[k],display:"inline-block"}}/>
                            {v}: {segments.filter(s=>s.cat===k).reduce((a,s)=>a+s.count,0)} sessions
                          </span>
                        ))}
                      </div>
                    </div>
                  );
                })()}
              </div>

              {/* Session history */}
              <div style={{padding:"16px 22px"}}>
                <div style={{fontWeight:600,fontSize:13,marginBottom:10}}>Session History (most recent first)</div>
                <div style={{maxHeight:240,overflowY:"auto"}}>
                  {sessions.length===0&&<div style={{color:"#aaa",fontSize:13}}>No sessions recorded yet.</div>}
                  {sessions.map((s,i)=>(
                    <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"7px 0",borderBottom:"1px solid #f5f5f5"}}>
                      <span style={{minWidth:100,fontSize:12,color:"#555"}}>{s.date}</span>
                      <span style={{padding:"2px 8px",borderRadius:4,fontSize:11,fontWeight:600,background:s.status==="P"?"#dcfce7":s.status==="A"?"#fee2e2":"#f3f4f6",color:s.status==="P"?"#15803d":s.status==="A"?"#b91c1c":"#888"}}>
                        {s.status==="P"?"Present":s.status==="A"?"Absent":"—"}
                      </span>
                      {s.note&&<span style={{fontSize:11,color:"#888",fontStyle:"italic"}}>📝 {s.note}</span>}
                    </div>
                  ))}
                </div>
              </div>
              <div style={{padding:"12px 22px",borderTop:"1px solid #f0f0f0",textAlign:"right"}}>
                <button className="btn btn-gray" onClick={()=>setProfileMember(null)}>Close</button>
              </div>
            </div>
          </div>
        );
      })()}

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
